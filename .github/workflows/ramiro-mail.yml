name: Mail Ramiro
on:
  schedule:
    - cron: '0 11 * * 1'
    - cron: '0 11 * * 5'
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar alertas
        run: |
          curl -s https://gudino-asociados-default-rtdb.firebaseio.com/datos.json > /tmp/datos.json
          node -e "
          const fs = require('fs');
          const https = require('https');
          const data = JSON.parse(fs.readFileSync('/tmp/datos.json'));
          const mailCfg = data.mailCfg || {};
          const hoy = new Date();
          const hoyISO = hoy.toISOString().split('T')[0];
          const manISO = new Date(hoy.getTime()+86400000).toISOString().split('T')[0];
          const dia = hoy.getDay(); // 1=lun, 5=vie

          function enviarMail(dest, asunto, cuerpo, cb) {
            const body = JSON.stringify({
              service_id: '${{ secrets.EJS_SVC }}',
              template_id: '${{ secrets.EJS_TPL }}',
              user_id: '${{ secrets.EJS_KEY }}',
              accessToken: '${{ secrets.EJS_PRIVATE_KEY }}',
              template_params: { cliente: asunto, hora: '08:00', motivo: cuerpo, fecha: hoy.toLocaleDateString('es-AR') }
            });
            const opts = { hostname: 'api.emailjs.com', path: '/api/v1.0/email/send', method: 'POST', headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body) } };
            const req = https.request(opts, r => { let d=''; r.on('data',c=>d+=c); r.on('end',()=>{ console.log('OK a',dest,':',d); if(cb)cb(); }); });
            req.on('error', e => console.error('Error:',e.message));
            req.write(body); req.end();
          }

          // ── 1. RESUMEN RAMIRO (solo lunes y viernes) ──
          if (dia === 1 || dia === 5) {
            const pendCausas = (data.causas||[]).filter(c=>c.ram&&!c.rdon);
            const pendExt = (data.extraj||[]).filter(e=>e.ram&&!e.rdon);
            const pendGen = (data.tareasRam||[]).filter(t=>!t.done);
            if (pendCausas.length || pendExt.length || pendGen.length) {
              let msg = 'TAREAS PENDIENTES PARA RAMIRO:\n\n';
              if (pendGen.length) { msg += 'TAREAS GENERALES:\n'; pendGen.forEach(t=>msg+='- '+t.txt+'\n'); msg+='\n'; }
              if (pendCausas.length||pendExt.length) { msg += 'ENCARGOS EN CAUSAS:\n'; [...pendCausas,...pendExt].forEach(c=>msg+='- '+(c.car||c.tit)+': '+c.ram+'\n'); }
              const titulo = 'Tareas de Ramiro - ' + (dia===1?'Lunes':'Viernes');
              [mailCfg.emailRam, mailCfg.email].filter(Boolean).forEach(dest => enviarMail(dest, titulo, msg));
            } else { console.log('Sin tareas para Ramiro'); }
          }

          // ── 2. AUDIENCIAS MAÑANA ──
          const audMañana = (data.audiencias||[]).filter(a=>a.f===manISO);
          if (audMañana.length && mailCfg.email) {
            let msg = 'AUDIENCIAS MAÑANA:\n\n';
            audMañana.forEach(a => msg += '- ' + a.c + ' | ' + a.j + (a.h?' | '+a.h+' hs':'') + (a.o?' | '+a.o:'') + '\n');
            enviarMail(mailCfg.email, '📅 Audiencias mañana (' + manISO.split('-').reverse().join('/') + ')', msg);
          }

          // ── 3. VENCIMIENTOS MÍOS MAÑANA ──
          const venMañana = (data.causas||[]).filter(c=>c.ven===manISO&&c.tipo_venc==='vencimiento');
          if (venMañana.length && mailCfg.email) {
            let msg = 'VENCIMIENTOS MAÑANA:\n\n';
            venMañana.forEach(c => msg += '- ' + c.car + ': Plazo para ' + (c.tv||'vencimiento') + '\n');
            enviarMail(mailCfg.email, '⏰ Vencimientos mañana (' + manISO.split('-').reverse().join('/') + ')', msg);
          }
          "
